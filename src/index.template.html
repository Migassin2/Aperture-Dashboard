<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aperture · 光瞳</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.2/echarts.min.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">Aperture · 光瞳</p>
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle" class="hero-subtitle"></p>
        </div>
        <div class="language-switcher">
          <button class="lang-btn active" data-locale="en">EN</button>
          <button class="lang-btn" data-locale="zh">中文</button>
        </div>
      </header>

      <main class="dashboard-grid">
        <section class="metric-grid" id="metric-grid"></section>

        <section class="chart-panel">
          <div class="panel-header">
            <h2 id="trend-title"></h2>
          </div>
          <div id="trend-chart" class="chart-card"></div>
        </section>

        <section class="category-panel">
          <div class="panel-header">
            <h2 id="category-title"></h2>
          </div>
          <div id="category-chart" class="chart-card"></div>
        </section>

        <section class="top-products-panel panel-card">
          <div class="panel-header">
            <h2 id="top-products-title"></h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th id="product-header"></th>
                  <th id="category-header"></th>
                  <th id="revenue-header"></th>
                  <th id="growth-header"></th>
                </tr>
              </thead>
              <tbody id="product-rows"></tbody>
            </table>
          </div>
        </section>

        <section class="highlight-panel panel-card">
          <div class="panel-header">
            <h2 id="insights-title"></h2>
          </div>
          <div class="highlight-grid" id="highlight-grid"></div>
        </section>
      </main>
    </div>

    <!-- EMBED_DATA -->
    <script src="script.js"></script>
  </body>
</html>
